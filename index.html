<!DOCTYPE html>
<html>
<head>
  <title>Siva - DevOps Journey</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      perspective: 1000px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 50px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease-out;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .greeting {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.8s ease-out;
    }

    .emoji-large {
      font-size: 60px;
      display: block;
      margin: 15px 0;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .intro {
      font-size: 18px;
      color: #666;
      line-height: 1.6;
      margin: 20px 0 30px;
      font-weight: 300;
    }

    .intro-highlight {
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      height: 3px;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      border-radius: 2px;
      margin: 25px auto;
      width: 60px;
    }

    .button-container {
      margin-top: 30px;
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #764ba2, #f093fb);
      transition: left 0.3s ease;
      z-index: -1;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
      letter-spacing: 0.5px;
    }

    button:active {
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 25px;
      }

      .greeting {
        font-size: 38px;
      }

      .emoji-large {
        font-size: 48px;
      }

      .intro {
        font-size: 16px;
      }

      button {
        padding: 12px 30px;
        font-size: 15px;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    <div class="card">
      <h1 class="greeting">Hello Mama</h1>
      <span class="emoji-large">😄</span>
      <div class="divider"></div>
      <p class="intro">I am <span class="intro-highlight">Siva</span> <span style="font-size: 18px;">🚀</span></p>
      <p class="intro">Learning <span class="intro-highlight">DevOps</span> & Cloud Technologies</p>
      <div class="button-container">
        <button onclick="showMsg()">✨ Click Me</button>
      </div>
    </div>
  </div>

  <script>
    function showMsg() {
      alert("Welcome Mama 🔥\n\nKeeping up the great work with DevOps!");
    }
  </script>

</body>
</html>
